[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm --prefix frontend install && npm --prefix frontend run build && npm --prefix backend install && npx --prefix backend prisma generate"

[deploy]
startCommand = "node backend/src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
